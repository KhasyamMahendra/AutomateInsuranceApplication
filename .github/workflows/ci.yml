name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Code Quality & Linting
  # ─────────────────────────────────────────────
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 . \
            --max-line-length=120 \
            --exclude=.git,__pycache__,*.egg-info \
            --statistics

  # ─────────────────────────────────────────────
  # JOB 2: Unit Tests & Coverage
  # ─────────────────────────────────────────────
  test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train ML model
        run: python train_model.py

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-omit=train_model.py \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 3: Model Training Validation
  # ─────────────────────────────────────────────
  validate-model:
    name: Validate ML Model Training
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train and validate model
        run: python train_model.py

      - name: Verify model artifact exists
        run: |
          if [ ! -f insurance_model.pkl ]; then
            echo "ERROR: insurance_model.pkl was not generated!"
            exit 1
          fi
          echo "Model artifact verified: $(du -h insurance_model.pkl)"

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: insurance-model
          path: insurance_model.pkl
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 4: Security Scan
  # ─────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Bandit (security linter)
        run: pip install bandit

      - name: Run Bandit security scan
        run: |
          bandit -r . \
            --exclude ./tests,__pycache__ \
            --severity-level medium \
            --format json \
            --output bandit-report.json || true

      - name: Display security report
        run: |
          pip install bandit
          bandit -r . \
            --exclude ./tests,__pycache__ \
            --severity-level medium \
            --format txt || true

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: bandit-report.json
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 5: Docker Build Validation
  # ─────────────────────────────────────────────
  docker-build-check:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [test, validate-model]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: insurance-app:ci-check
