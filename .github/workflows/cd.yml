name: CD Pipeline

on:
  push:
    branches:
      - main
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches:
      - main

# Cancel any in-progress deployment if a newer push arrives
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build & Push Docker Image to GHCR
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    # Only run if the CI pipeline succeeded (when triggered via workflow_run)
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies & train model
        run: |
          pip install -r requirements.txt
          python train_model.py
          echo "Model artifact generated: $(ls -lh insurance_model.pkl)"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image summary
        run: |
          echo "### Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** ${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # JOB 2: Dummy AWS Deployment Placeholder
  # This keeps the pipeline AWS-themed without requiring AWS setup.
  # ─────────────────────────────────────────────
  deploy-aws-dummy:
    name: Dummy AWS Deployment
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Skip AWS deployment
        run: |
          echo "AWS deployment is disabled for this project."
          echo "Docker image was built successfully, but no AWS deployment was performed."

      - name: Deployment summary
        run: |
          echo "### Dummy AWS Deployment Completed" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Skipped" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ghcr.io/${{ github.repository }}:sha-${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # JOB 3: Notify on Failure
  # ─────────────────────────────────────────────
  notify-failure:
    name: Notify on Deployment Failure
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-aws-dummy]
    if: failure()

    steps:
      - name: Send failure notification
        run: |
          echo "CD Pipeline FAILED for commit ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Triggered by: ${{ github.actor }}"
          # Add Slack/Teams/email webhook call here if needed:
          # curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
          #   -H 'Content-type: application/json' \
          #   --data '{"text": "Deployment failed for ${{ github.repository }} on ${{ github.ref_name }}"}'
