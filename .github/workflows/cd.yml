name: CD Pipeline

on:
  push:
    branches:
      - main
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches:
      - main

# Cancel any in-progress deployment if a newer push arrives
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build & Push Docker Image to GHCR
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    # Only run if the CI pipeline succeeded (when triggered via workflow_run)
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies & train model
        run: |
          pip install -r requirements.txt
          python train_model.py
          echo "Model artifact generated: $(ls -lh insurance_model.pkl)"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image summary
        run: |
          echo "### Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** ${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # JOB 2: Deploy to Azure App Service
  # Requires secrets: AZURE_CREDENTIALS, AZURE_APP_NAME
  # ─────────────────────────────────────────────
  deploy-azure:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: production
      url: https://${{ secrets.AZURE_APP_NAME }}.azurewebsites.net

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy container to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_NAME }}
          images: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}

      - name: Health check
        run: |
          echo "Waiting for app to become healthy..."
          sleep 30
          HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}" \
            https://${{ secrets.AZURE_APP_NAME }}.azurewebsites.net/)
          echo "HTTP Status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "Health check failed with status $HTTP_STATUS"
            exit 1
          fi
          echo "Health check passed!"

      - name: Deployment summary
        run: |
          echo "### Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** Production" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://${{ secrets.AZURE_APP_NAME }}.azurewebsites.net" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ghcr.io/${{ github.repository }}:sha-${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # JOB 3: Notify on Failure
  # ─────────────────────────────────────────────
  notify-failure:
    name: Notify on Deployment Failure
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-azure]
    if: failure()

    steps:
      - name: Send failure notification
        run: |
          echo "CD Pipeline FAILED for commit ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Triggered by: ${{ github.actor }}"
          # Add Slack/Teams/email webhook call here if needed:
          # curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
          #   -H 'Content-type: application/json' \
          #   --data '{"text": "Deployment failed for ${{ github.repository }} on ${{ github.ref_name }}"}'
