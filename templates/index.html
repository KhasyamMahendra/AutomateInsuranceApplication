<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZelisDemo - Insurance Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: lightskyblue; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h1 { color: #1e3a8a; text-align: center; font-size: 1.5rem; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #64748b; font-size: 0.9rem; margin-bottom: 25px; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; color: #334155; margin-bottom: 5px; font-size: 0.9rem; }
        input, select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        
        button { width: 100%; background: #2563eb; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: background 0.3s; }
        button:hover { background: #1d4ed8; }

        .result { margin-top: 25px; padding: 15px; background: #ecfdf5; border: 1px solid #10b981; border-radius: 8px; text-align: center; color: #065f46; }
        .result h2 { margin: 0; font-size: 1.8rem; }
        .result small { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🏥 Insurance AI</h1>
        <p class="subtitle">Premium Cost Estimator</p>

        <form action="/predict" method="post">
            <div class="form-group">
                <label>Age (Years)</label>
                <input type="number" name="age" placeholder="e.g. 30" required value="{{ age }}">
            </div>

            <div class="form-group">
                <label>BMI (Body Mass Index)</label>
                <input type="number" step="0.1" name="bmi" placeholder="e.g. 24.5" required value="{{ bmi }}">
            </div>

            <div class="form-group">
                <label>Smoker Status</label>
                <select name="smoker">
                    <option value="no" {% if smoker == 'no' %}selected{% endif %}>No</option>
                    <option value="yes" {% if smoker == 'yes' %}selected{% endif %}>Yes</option>
                </select>
            </div>

            <button type="submit">Calculate Premium</button>
        </form>

        {% if prediction %}
        <div class="result">
            <small>Estimated Annual Cost</small>
            <h2>{{ prediction }}</h2>
        </div>
        {% endif %}
    </div>

</body>
</html>
